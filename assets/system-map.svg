<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">System map</title>
  <desc id="desc">A compact map of the kinds of systems nickihysterics builds.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="line" x1="88" y1="150" x2="1112" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.52" stop-color="#0284C7"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="298" rx="24" fill="url(#card)" stroke="#D5E3DF"/>
  <text x="60" y="56" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">system thinking, not just syntax</text>
  <text x="60" y="86" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">capture inputs, model the workflow, persist clean data, expose an API, ship a usable interface</text>

  <path d="M110 154H1090" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect x="70" y="122" width="170" height="94" rx="16" fill="#FFFFFF" stroke="#B6D6CF"/>
      <circle cx="104" cy="154" r="14" fill="#CCFBF1"/>
      <path d="M96 154H112M104 146V162" stroke="#0F766E" stroke-width="3" stroke-linecap="round"/>
      <text x="128" y="151" fill="#0F172A" font-size="18" font-weight="800">Capture</text>
      <text x="92" y="188" fill="#64748B" font-size="13">RTSP, webcam, forms</text>
    </g>

    <g>
      <rect x="282" y="122" width="170" height="94" rx="16" fill="#FFFFFF" stroke="#B9D9E8"/>
      <circle cx="316" cy="154" r="14" fill="#E0F2FE"/>
      <path d="M309 154H323M316 147L323 154L316 161" stroke="#0284C7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="340" y="151" fill="#0F172A" font-size="18" font-weight="800">Process</text>
      <text x="304" y="188" fill="#64748B" font-size="13">OpenCV, ONNX, jobs</text>
    </g>

    <g>
      <rect x="494" y="122" width="170" height="94" rx="16" fill="#FFFFFF" stroke="#C7D2FE"/>
      <circle cx="528" cy="154" r="14" fill="#EEF2FF"/>
      <path d="M521 151C521 147 535 147 535 151V160C535 164 521 164 521 160V151Z" stroke="#4F46E5" stroke-width="2.6"/>
      <path d="M521 151C521 155 535 155 535 151" stroke="#4F46E5" stroke-width="2.6"/>
      <text x="552" y="151" fill="#0F172A" font-size="18" font-weight="800">Persist</text>
      <text x="516" y="188" fill="#64748B" font-size="13">Postgres, SQLite, files</text>
    </g>

    <g>
      <rect x="706" y="122" width="170" height="94" rx="16" fill="#FFFFFF" stroke="#FED7AA"/>
      <circle cx="740" cy="154" r="14" fill="#FFEDD5"/>
      <path d="M733 154H747M740 147V161" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
      <text x="764" y="151" fill="#0F172A" font-size="18" font-weight="800">Expose</text>
      <text x="728" y="188" fill="#64748B" font-size="13">DRF, FastAPI, reports</text>
    </g>

    <g>
      <rect x="918" y="122" width="212" height="94" rx="16" fill="#FFFFFF" stroke="#BBF7D0"/>
      <circle cx="952" cy="154" r="14" fill="#DCFCE7"/>
      <path d="M944 151H960V161H944V151Z" stroke="#16A34A" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M947 146H957" stroke="#16A34A" stroke-width="2.6" stroke-linecap="round"/>
      <text x="976" y="151" fill="#0F172A" font-size="18" font-weight="800">Ship UI</text>
      <text x="940" y="188" fill="#64748B" font-size="13">Django views, Qt, Web UI</text>
    </g>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="700">
    <rect x="60" y="244" width="180" height="30" rx="15" fill="#ECFDF5" stroke="#99F6E4"/>
    <text x="86" y="264" fill="#0F766E">PetTrace</text>
    <rect x="260" y="244" width="180" height="30" rx="15" fill="#F0F9FF" stroke="#BAE6FD"/>
    <text x="286" y="264" fill="#0284C7">PyDVR</text>
    <rect x="460" y="244" width="230" height="30" rx="15" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="486" y="264" fill="#EA580C">Gaze Tracker</text>
    <rect x="710" y="244" width="200" height="30" rx="15" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="736" y="264" fill="#475569">PyNDS</text>
    <rect x="930" y="244" width="210" height="30" rx="15" fill="#FAF5FF" stroke="#E9D5FF"/>
    <text x="956" y="264" fill="#7E22CE">cpp-gradebook</text>
  </g>
</svg>
