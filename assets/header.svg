    <circle cx="224" cy="238" r="4" fill="#2DD4BF"/>
    <circle cx="285" cy="238" r="4" fill="#2DD4BF"/>
    <path d="M400 284H710" stroke="#FB923C" stroke-width="2"/>
    <path d="M520 284L546 258H610L638 230H710" stroke="#FB923C" stroke-width="2"/>
